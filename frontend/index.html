<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Smart-ID - Secure health identity management system with NFC, biometric authentication, and emergency access features." />
  <meta name="theme-color" content="#0F172A" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>Smart-ID | Health Identity System</title>

  <!-- Tailwind CDN (temporary, safe for UI phase) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet" />

  <!-- Tailwind config -->
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#49A09D",
            "background-light": "#FFFFFF",
            "background-dark": "#0F172A",
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
          },
        },
      },
    };
  </script>

  <style type="text/tailwindcss">
    .custom-shape {
        border-radius: 40% 60% 60% 40% / 50% 50% 50% 50%;
      }
      .active-tab {
        border-bottom: 2px solid #49A09D;
        color: #49A09D;
      }
    
    /* Dark mode input text fixes */
    .dark input[type="text"],
    .dark input[type="email"],
    .dark input[type="password"],
    .dark input[type="number"],
    .dark input[type="tel"],
    .dark input[type="search"],
    .dark input[type="url"],
    .dark input[type="date"],
    .dark input[type="time"],
    .dark input[type="datetime-local"],
    .dark textarea,
    .dark select {
      color: #f8fafc !important;
    }
    
    .dark input::placeholder,
    .dark textarea::placeholder {
      color: #94a3b8 !important;
    }
    
    /* Dark mode select arrows */
    .dark select {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e") !important;
      background-position: right 0.5rem center !important;
      background-repeat: no-repeat !important;
      background-size: 1.5em 1.5em !important;
      padding-right: 2.5rem !important;
    }
    
    /* Dark mode input autofill */
    .dark input:-webkit-autofill,
    .dark input:-webkit-autofill:hover,
    .dark input:-webkit-autofill:focus {
      -webkit-text-fill-color: #f8fafc !important;
      -webkit-box-shadow: 0 0 0px 1000px #1e293b inset !important;
      caret-color: #f8fafc !important;
    }
  </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
